<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Video Player</title>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f1115;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: #00a8ff;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0090dd;
    }

    .player-wrapper {
      width: 100%;
      background: black;
      border-radius: 16px;
      overflow: hidden;
      min-height: 550px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video,
    iframe {
      width: 100%;
      height: 550px;
      border: none;
      background: black;
    }

    .info {
      margin-top: 20px;
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Universal Video Player</h1>

  <div class="controls">
    <input
      type="text"
      id="videoUrl"
      placeholder="Cole aqui o link do vídeo..."
    />
    <button onclick="loadVideo()">Abrir</button>
  </div>

  <div class="player-wrapper" id="playerWrapper">

    <video
      id="videoPlayer"
      controls
      playsinline
      style="display:none;"
    ></video>

    <iframe
      id="iframePlayer"
      allowfullscreen
      allow="autoplay; encrypted-media"
      style="display:none;"
    ></iframe>

  </div>

  <div class="info">
    Suporta: MP4, M3U8 (HLS), YouTube, embeds, streams diretos e iframes.
  </div>

</div>

<script>

let player;
const video = document.getElementById('videoPlayer');
const iframe = document.getElementById('iframePlayer');

function resetPlayers() {

  video.style.display = 'none';
  iframe.style.display = 'none';

  video.pause();
  video.removeAttribute('src');
  video.load();

  iframe.src = '';

  if (player) {
    player.destroy();
  }
}

function isYouTube(url) {
  return (
    url.includes('youtube.com') ||
    url.includes('youtu.be')
  );
}

function getYouTubeEmbed(url) {

  let videoId = '';

  if (url.includes('youtu.be/')) {
    videoId = url.split('youtu.be/')[1].split('?')[0];
  }

  if (url.includes('watch?v=')) {
    videoId = new URL(url).searchParams.get('v');
  }

  return `https://www.youtube.com/embed/${videoId}?autoplay=1`;
}

function isM3U8(url) {
  return url.includes('.m3u8');
}

function isDirectVideo(url) {

  return (
    url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i)
  );
}

function isEmbed(url) {

  return (
    url.includes('/embed/') ||
    url.includes('player') ||
    url.includes('iframe')
  );
}

function loadVideo() {

  const url = document.getElementById('videoUrl').value.trim();

  if (!url) {
    alert('Cole um link.');
    return;
  }

  resetPlayers();

  // YouTube
  if (isYouTube(url)) {

    iframe.style.display = 'block';
    iframe.src = getYouTubeEmbed(url);

    return;
  }

  // M3U8 / HLS
  if (isM3U8(url)) {

    video.style.display = 'block';

    if (Hls.isSupported()) {

      const hls = new Hls();

      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {

        player = new Plyr(video);
        video.play();

      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

      video.src = url;
      player = new Plyr(video);

      video.play();
    }

    return;
  }

  // MP4 / WebM / OGG
  if (isDirectVideo(url)) {

    video.style.display = 'block';

    video.src = url;

    player = new Plyr(video);

    video.play();

    return;
  }

  // Embed / iframe
  if (isEmbed(url)) {

    iframe.style.display = 'block';
    iframe.src = url;

    return;
  }

  // fallback automático
  iframe.style.display = 'block';
  iframe.src = url;
}

</script>

</body>
</html>
