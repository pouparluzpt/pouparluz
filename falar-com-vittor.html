<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando para WhatsApp</title>
    <meta http-equiv="refresh" content="3; url=https://wa.me/351927431517?text=Olá Vittor, gostaria de agendar um horário 😍💗">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
            color: #333;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #25D366;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .whatsapp-icon {
            color: #25D366;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="whatsapp-icon">📱</div>
    <h1>Redirecionando para o WhatsApp...</h1>
    <div class="loader"></div>
    <p>Se o redirecionamento não funcionar automaticamente, <a href="https://wa.me/351927431517?text=Olá Vittor, gostaria de agendar um horário 😍💗" id="manual-link">clique aqui</a>.</p>
    
    <script>
        // Redirecionamento alternativo caso o meta refresh não funcione
        setTimeout(function() {
            window.location.href = "https://wa.me/351927431517?text=Olá Vittor, gostaria de agendar um horário 😍💗";
        }, 3000);
        
        // Adiciona o link manualmente como fallback
        document.getElementById('manual-link').href = "https://wa.me/351927431517?text=Olá Vittor, gostaria de agendar um horário 😍💗";
    </script>
</body>
</html>
