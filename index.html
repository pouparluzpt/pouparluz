<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a2a3a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EnergyGlass">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22EnergyGlass%22,%22short_name%22:%22EnergyGlass%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%221a2a3a%22,%22theme_color%22:%231a2a3a%22,%22icons%22:[{%22src%22:%22https://via.placeholder.com/192x192?text=EG%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]}">
    <title>EnergyGlass · Gestão Comercializadoras PT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', 'SF Pro Text', system-ui, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1a);
            padding: 16px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            padding: 24px;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .menu-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(24px);
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .btn {
            background: rgba(0, 87, 163, 0.9);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-secondary {
            background: rgba(108, 117, 125, 0.8);
        }

        .btn-danger {
            background: rgba(178, 34, 52, 0.85);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 120, 255, 0.3);
        }

        label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 6px;
            display: block;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .grid-responsive {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .map-placeholder {
            height: 180px;
            border-radius: 28px;
            overflow: hidden;
            margin-top: 6px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 16px 0 12px 0;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-left: 4px solid #ffd966;
            padding-left: 12px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.2);
            border-radius: 28px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        th {
            background: rgba(0,0,0,0.3);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 28px;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-card {
            width: 380px;
            max-width: 90%;
        }

        .success-msg {
            background: #2ecc71;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            margin-bottom: 16px;
            color: white;
            font-weight: bold;
        }

        .badge {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: white;
        }

        button:hover { opacity: 0.9; transform: scale(0.98); }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .glass-card { padding: 18px; border-radius: 32px; }
            .menu-glass { padding: 10px 16px; gap: 8px; }
            .btn { padding: 8px 16px; font-size: 0.8rem; }
            .section-title { font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .grid-responsive { gap: 16px; }
            input, select, textarea { padding: 10px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div id="appRoot" class="app-container"></div>

<script>
    // ==================== LISTA DE COMERCIALIZADORAS (ordem alfabética) ====================
    const comercializadoras = [
        "Alfa Energia", "Cooperativa Elétrica", "EDP Comercial", "Endesa", "Energia Simples",
        "Energy24", "Galp Energia", "Goldenergy", "Iberdrola", "Logica Energy", "Luzboa",
        "MEO Energia", "Plenitude", "Repsol Electricidade", "SU Eletricidade", "Universal Energy"
    ].sort();

    // ==================== DADOS GLOBAIS (localStorage) ====================
    let currentUser = null;
    let clientsArray = [];
    let usersArray = [];

    function loadLocalData() {
        const storedClients = localStorage.getItem("energy_clients");
        clientsArray = storedClients ? JSON.parse(storedClients) : [];
        
        const storedUsers = localStorage.getItem("energy_users");
        if (storedUsers) {
            usersArray = JSON.parse(storedUsers);
        } else {
            usersArray = [
                { id: "1", username: "admin", password: "admin123", role: "admin", nomeColab: "Administrador" },
                { id: "2", username: "vendedor", password: "vender123", role: "vendedor", nomeColab: "Joana Vendas" }
            ];
            saveLocalData();
        }
    }

    function saveLocalData() {
        localStorage.setItem("energy_clients", JSON.stringify(clientsArray));
        localStorage.setItem("energy_users", JSON.stringify(usersArray));
    }

    function nowDateTime() {
        return new Date().toLocaleString("pt-PT");
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getScriptHint() {
        const tips = [
            "✨ Dica: Ofereça análise gratuita de consumo para fidelizar o cliente",
            "📞 Script sugerido: 'Com a nova comercializadora, pode poupar até 15% na fatura da luz e 10% no gás'",
            "🔥 Gás: Clientes no escalão 3 ou 4 têm direito a desconto especial na renovação",
            "⚡ Lembrete: Verifique se a potência contratada é adequada ao perfil do cliente antes de vender",
            "📅 Vendas antigas: Clientes com mais de 3 meses devem ser contactados para renegociação"
        ];
        return tips[Math.floor(Math.random() * tips.length)];
    }

    // Mapa
    let currentMap = null;
    function initMapPreview(containerId, address) {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (currentMap) currentMap.remove();
        const map = L.map(containerId).setView([39.3999, -8.2245], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        if (address && address.trim() !== "") {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ", Portugal")}&limit=1`)
                .then(r => r.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);
                        map.setView([lat, lon], 14);
                        L.marker([lat, lon]).addTo(map).bindPopup(address).openPopup();
                    }
                }).catch(e => console.warn("Map error:", e));
        }
        currentMap = map;
    }

    // ==================== FORMULÁRIO ====================
    function renderForm(editId = null) {
        const existing = editId ? clientsArray.find(c => c.id === editId) : null;
        const isEdit = !!existing;
        const data = existing || {
            nome: "", nif: "", nasc: "", telefone: "", email: "", morada: "", cpe: "",
            potencia: "3.45", cui: "", escalaGas: "1", 
            comercializadoraAtual: comercializadoras[0], comercializadoraNova: comercializadoras[0],
            faturaEletronica: false, iban: "", moradaFatura: "", mesmaMorada: true, 
            tipoEntrada: "Mudança de comercializadora", obs: "",
            dataReg: nowDateTime(), registradoPor: currentUser?.username
        };

        // Gerar options das comercializadoras
        const comOptions = comercializadoras.map(c => `<option ${data.comercializadoraAtual === c ? 'selected' : ''}>${c}</option>`).join('');
        const comOptionsNova = comercializadoras.map(c => `<option ${data.comercializadoraNova === c ? 'selected' : ''}>${c}</option>`).join('');

        const html = `
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px">
                <h2 style="color:white">${isEdit ? "✏️ Editar Cliente" : "✨ Novo Registo"}</h2>
                <span class="badge">${currentUser?.username}</span>
            </div>
            <div id="formSuccessMsg" style="display:none;" class="success-msg"></div>
            <div class="grid-responsive">
                <!-- Coluna 1: DADOS PESSOAIS -->
                <div>
                    <div class="section-title">📋 DADOS PESSOAIS</div>
                    <div class="form-row"><label>Nome do cliente *</label><input id="nome" value="${escapeHtml(data.nome)}" placeholder="Maria Silva"></div>
                    <div class="form-row"><label>NIF</label><input id="nif" value="${data.nif || ''}" placeholder="123456789"></div>
                    <div class="form-row"><label>Data de nascimento</label><input type="date" id="nasc" value="${data.nasc || ''}"></div>
                    <div class="form-row"><label>Telefone</label><input id="telefone" value="${data.telefone || ''}" placeholder="912345678"></div>
                    <div class="form-row"><label>E-mail</label><input id="email" value="${data.email || ''}" type="email" placeholder="cliente@email.pt"></div>
                    <div class="form-row"><label>Morada (fornecimento)</label><input id="morada" value="${escapeHtml(data.morada || '')}" placeholder="Rua, nº, cidade"></div>
                    <div id="mapPreview" class="map-placeholder"></div>
                    <div class="form-row"><label>CPE (Luz)</label><input id="cpe" value="${data.cpe || ''}" placeholder="PT0000xxxxxxxx"></div>
                </div>
                
                <!-- Coluna 2: LUZ, GÁS, COMERCIALIZADORAS -->
                <div>
                    <div class="section-title">⚡ LUZ</div>
                    <div class="form-row"><label>Potência contratada (kVA)</label><select id="potencia">
                        ${[1.15, 2.3, 3.45, 4.6, 5.75, 6.9, 10.35, 13.8, 20.7].map(p => `<option ${data.potencia == p ? 'selected' : ''}>${p}</option>`).join('')}
                    </select></div>
                    
                    <div class="form-row"><label>Comercializadora ATUAL (Luz)</label><select id="comercializadoraAtual">${comOptions}</select></div>
                    
                    <div class="form-row"><label>Nova Comercializadora (Luz)</label><select id="comercializadoraNova">${comOptionsNova}</select></div>
                    
                    <div class="section-title">🔥 GÁS</div>
                    <div class="form-row"><label>CUI</label><input id="cui" value="${data.cui || ''}" placeholder="CUI número"></div>
                    <div class="form-row"><label>Escalão de gás (1 a 4)</label><select id="escalaGas">
                        <option ${data.escalaGas == "1" ? "selected" : ""}>1</option>
                        <option ${data.escalaGas == "2" ? "selected" : ""}>2</option>
                        <option ${data.escalaGas == "3" ? "selected" : ""}>3</option>
                        <option ${data.escalaGas == "4" ? "selected" : ""}>4</option>
                    </select></div>
                </div>
                
                <!-- Coluna 3: FATURAÇÃO E OBS -->
                <div>
                    <div class="section-title">🧾 TIPO DE FATURAÇÃO</div>
                    <div class="form-row"><label>FE (Fatura Eletrónica)</label><select id="feSelect">
                        <option value="sim" ${data.faturaEletronica ? "selected" : ""}>Sim</option>
                        <option value="nao" ${!data.faturaEletronica ? "selected" : ""}>Não</option>
                    </select></div>
                    <div id="faturaDinamica"></div>
                    
                    <div class="form-row"><label>Tipo de entrada</label><select id="tipoEntrada">
                        <option ${data.tipoEntrada == "Mudança de comercializadora" ? "selected" : ""}>Mudança de comercializadora</option>
                        <option ${data.tipoEntrada == "Mudança de Titularidade" ? "selected" : ""}>Mudança de Titularidade</option>
                        <option ${data.tipoEntrada == "Mudança de comercializadora com alteração de titularidade" ? "selected" : ""}>Mudança de comercializadora com alteração de titularidade</option>
                        <option ${data.tipoEntrada == "Entrada Direta" ? "selected" : ""}>Entrada Direta</option>
                    </select></div>
                    
                    <div class="form-row"><label>Observações</label><textarea id="obs" rows="2" placeholder="Notas importantes...">${escapeHtml(data.obs || '')}</textarea></div>
                    <div class="form-row"><small style="color:rgba(255,255,255,0.7)">🕒 Data/Hora registo: ${data.dataReg}</small></div>
                </div>
            </div>
            <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px; flex-wrap:wrap">
                <button class="btn btn-secondary" id="cancelFormBtn">Cancelar</button>
                <button class="btn" id="saveFormBtn">${isEdit ? "Atualizar" : "Guardar Cliente"}</button>
            </div>
            <div style="margin-top:16px; background:rgba(0,0,0,0.25); border-radius:28px; padding:12px">
                <span style="color:#ffe8b6">💬 Dica de vendas: ${getScriptHint()}</span>
            </div>
        </div>`;

        document.getElementById("mainContent").innerHTML = html;

        // Configurar campos dinâmicos de faturação
        const updateFaturaFields = () => {
            const isFe = document.getElementById("feSelect").value === "sim";
            const container = document.getElementById("faturaDinamica");
            if (isFe) {
                container.innerHTML = `<div class="form-row">
                    <label>IBAN</label>
                    <input id="iban" maxlength="25" placeholder="PT50 0000 0000 0000 0000">
                    <span class="badge" id="ibanCount">0/25</span>
                </div>`;
                const ibanInput = document.getElementById("iban");
                if (data.iban) ibanInput.value = data.iban;
                const countSpan = document.getElementById("ibanCount");
                ibanInput?.addEventListener("input", (e) => { 
                    if (countSpan) countSpan.innerText = e.target.value.length + "/25"; 
                });
                if (countSpan && ibanInput) countSpan.innerText = ibanInput.value.length + "/25";
            } else {
                container.innerHTML = `<div class="form-row">
                    <label>Morada para envio da fatura em papel</label>
                    <input id="moradaPapel" placeholder="Morada para envio da fatura">
                    <button id="copyMoradaBtn" class="btn-sm" type="button" style="margin-top:8px">📋 Colar a mesma morada</button>
                    <div style="margin-top:8px">
                        <label style="display:inline-flex; gap:8px; align-items:center">
                            <input type="checkbox" id="difCheck"> Usar morada diferente da morada de fornecimento
                        </label>
                    </div>
                </div>`;
                const papelInput = document.getElementById("moradaPapel");
                if (data.moradaFatura) papelInput.value = data.moradaFatura;
                document.getElementById("copyMoradaBtn")?.addEventListener("click", () => {
                    const moradaMain = document.getElementById("morada").value;
                    if (papelInput) papelInput.value = moradaMain;
                });
                if (data.mesmaMorada === false) document.getElementById("difCheck").checked = true;
            }
        };
        
        const feSelect = document.getElementById("feSelect");
        if (feSelect) feSelect.addEventListener("change", updateFaturaFields);
        updateFaturaFields();

        // Mapa
        const moradaField = document.getElementById("morada");
        const updateMap = () => initMapPreview("mapPreview", moradaField.value);
        moradaField.addEventListener("input", updateMap);
        updateMap();

        // Salvar
        document.getElementById("saveFormBtn").onclick = () => {
            const nome = document.getElementById("nome").value.trim();
            if (!nome) { alert("Por favor, preencha o nome do cliente"); return; }
            
            const isFe = document.getElementById("feSelect").value === "sim";
            let ibanVal = "", moradaFatVal = "", mesmaMoradaFlag = true;
            
            if (isFe) {
                ibanVal = document.getElementById("iban")?.value || "";
            } else {
                const moradaPapel = document.getElementById("moradaPapel")?.value || "";
                const dif = document.getElementById("difCheck")?.checked || false;
                mesmaMoradaFlag = !dif;
                moradaFatVal = dif ? moradaPapel : document.getElementById("morada").value;
            }

            const clienteObj = {
                id: isEdit ? data.id : Date.now().toString(),
                nome: nome,
                nif: document.getElementById("nif").value,
                nasc: document.getElementById("nasc").value,
                telefone: document.getElementById("telefone").value,
                email: document.getElementById("email").value,
                morada: document.getElementById("morada").value,
                cpe: document.getElementById("cpe").value,
                potencia: document.getElementById("potencia").value,
                cui: document.getElementById("cui").value,
                escalaGas: document.getElementById("escalaGas").value,
                comercializadoraAtual: document.getElementById("comercializadoraAtual").value,
                comercializadoraNova: document.getElementById("comercializadoraNova").value,
                faturaEletronica: isFe,
                iban: ibanVal,
                moradaFatura: moradaFatVal,
                mesmaMorada: mesmaMoradaFlag,
                tipoEntrada: document.getElementById("tipoEntrada").value,
                obs: document.getElementById("obs").value,
                dataReg: isEdit ? data.dataReg : nowDateTime(),
                registradoPor: currentUser?.username
            };
            
            if (isEdit) {
                const index = clientsArray.findIndex(c => c.id === editId);
                if (index !== -1) clientsArray[index] = clienteObj;
            } else {
                clientsArray.push(clienteObj);
            }
            
            saveLocalData();
            
            if (!isEdit) {
                const successDiv = document.getElementById("formSuccessMsg");
                successDiv.style.display = "block";
                successDiv.innerHTML = "✅ Cliente guardado com sucesso! Formulário limpo para novo registo.";
                setTimeout(() => successDiv.style.display = "none", 2500);
                
                // Limpar formulário
                document.getElementById("nome").value = "";
                document.getElementById("nif").value = "";
                document.getElementById("nasc").value = "";
                document.getElementById("telefone").value = "";
                document.getElementById("email").value = "";
                document.getElementById("morada").value = "";
                document.getElementById("cpe").value = "";
                document.getElementById("cui").value = "";
                document.getElementById("obs").value = "";
                document.getElementById("potencia").value = "3.45";
                document.getElementById("escalaGas").value = "1";
                document.getElementById("tipoEntrada").value = "Mudança de comercializadora";
                document.getElementById("feSelect").value = "nao";
                document.getElementById("comercializadoraAtual").value = comercializadoras[0];
                document.getElementById("comercializadoraNova").value = comercializadoras[0];
                updateFaturaFields();
                initMapPreview("mapPreview", "");
            } else {
                renderListaClientes();
            }
        };
        
        document.getElementById("cancelFormBtn").onclick = () => renderListaClientes();
    }

    // ==================== LISTA DE CLIENTES ====================
    function renderListaClientes(searchTerm = "") {
        let filtered = clientsArray;
        if (searchTerm && searchTerm.trim() !== "") {
            const term = searchTerm.toLowerCase();
            filtered = clientsArray.filter(c => 
                (c.nome && c.nome.toLowerCase().includes(term)) || 
                (c.nif && c.nif.includes(term)) || 
                (c.nasc && c.nasc.includes(term))
            );
        }
        
        let html = `<div class="glass-card">
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px">
                <h2 style="color:white">📇 Clientes Registados</h2>
                <div style="display:flex; gap:8px; flex-wrap:wrap">
                    <input id="searchGlobal" placeholder="🔍 Buscar por Nome / NIF / Data" style="width:260px">
                    <button class="btn-sm" id="searchBtnGlass">Buscar</button>
                    <button class="btn" id="newClientBtnGlass">+ Novo Cliente</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Nome</th><th>NIF</th><th>Telefone</th><th>Comercializadora Atual</th><th>Nova Comercializadora</th><th>Data Registo</th><th>Lembrete (3+ meses)</th><th>Ações</th></tr>
                    </thead>
                    <tbody>`;
        
        for (const c of filtered) {
            let lembreteHtml = "✅ recente";
            if (c.dataReg) {
                try {
                    const partes = c.dataReg.split(',')[0].split('/');
                    const dataReg = new Date(partes[2], partes[1]-1, partes[0]);
                    const hoje = new Date();
                    const diffMeses = (hoje.getFullYear() - dataReg.getFullYear()) * 12 + (hoje.getMonth() - dataReg.getMonth());
                    if (diffMeses >= 3) {
                        lembreteHtml = `<span style="color:#ffaa66">🔔 Venda há ${diffMeses} meses. Ligar para troca!</span>`;
                    }
                } catch(e) {}
            }
            html += `<tr>
                <td>${escapeHtml(c.nome)}</td>
                <td>${c.nif || '-'}</td>
                <td>${c.telefone || '-'}</td>
                <td>${c.comercializadoraAtual || '-'}</td>
                <td>${c.comercializadoraNova || '-'}</td>
                <td>${c.dataReg || '-'}</td>
                <td>${lembreteHtml}</td>
                <td><button class="btn-sm editBtnGlass" data-id="${c.id}">Editar</button> <button class="btn-sm btn-danger delBtnGlass" data-id="${c.id}">Eliminar</button></td>
            </tr>`;
        }
        html += `</tbody>
                </table>
                ${filtered.length === 0 ? "<p style='color:white; text-align:center; padding:20px'>Nenhum cliente encontrado</p>" : ""}
            </div>
        </div>`;
        
        document.getElementById("mainContent").innerHTML = html;
        
        document.getElementById("newClientBtnGlass")?.addEventListener("click", () => renderForm());
        document.getElementById("searchBtnGlass")?.addEventListener("click", () => {
            const val = document.getElementById("searchGlobal").value;
            renderListaClientes(val);
        });
        document.querySelectorAll(".editBtnGlass").forEach(btn => {
            btn.addEventListener("click", () => renderForm(btn.getAttribute("data-id")));
        });
        document.querySelectorAll(".delBtnGlass").forEach(btn => {
            btn.addEventListener("click", () => {
                if (confirm("Eliminar cliente permanentemente?")) {
                    const id = btn.getAttribute("data-id");
                    clientsArray = clientsArray.filter(c => c.id !== id);
                    saveLocalData();
                    renderListaClientes();
                }
            });
        });
    }

    // ==================== PAINEL ADMIN ====================
    function renderAdminPanel() {
        if (currentUser?.role !== "admin") {
            renderListaClientes();
            return;
        }
        
        let html = `<div class="glass-card">
            <h2 style="color:white">👑 Painel Administrador</h2>
            
            <h3 style="color:rgba(255,255,255,0.9); margin:20px 0 10px 0">👥 Colaboradores Cadastrados</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Usuário</th><th>Nome</th><th>Perfil</th><th>Ações</th></tr></thead>
                    <tbody>`;
        for (const u of usersArray) {
            html += `<tr>
                <td>${escapeHtml(u.username)}</td>
                <td>${escapeHtml(u.nomeColab)}</td>
                <td>${u.role}</td>
                <td><button class="btn-sm btn-danger delUserBtn" data-id="${u.id}" data-user="${u.username}">Remover</button></td>
            </tr>`;
        }
        html += `</tbody></table></div>
        
        <hr style="margin:20px 0; border-color:rgba(255,255,255,0.2)">
        <h3 style="color:white">➕ Adicionar Novo Colaborador</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin:15px 0">
            <input id="newUsername" placeholder="Usuário" style="flex:1; min-width:140px">
            <input id="newPassword" type="password" placeholder="Senha" style="flex:1; min-width:140px">
            <input id="newNomeColab" placeholder="Nome completo" style="flex:1; min-width:140px">
            <select id="newRoleSelect"><option>vendedor</option><option>admin</option></select>
            <button class="btn" id="createUserBtn">Criar</button>
        </div>
        
        <hr style="margin:20px 0; border-color:rgba(255,255,255,0.2)">
        <h3 style="color:white">📊 Todos os Registos de Clientes</h3>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Cliente</th><th>Registado por</th><th>Data/Hora</th><th>Comercializadora</th><th>Nova Comerc.</th><th>Tipo Entrada</th></tr></thead>
                <tbody>`;
        for (const c of clientsArray) {
            html += `<tr>
                <td>${escapeHtml(c.nome)}</td>
                <td>${c.registradoPor || "?"}</td>
                <td>${c.dataReg || '-'}</td>
                <td>${c.comercializadoraAtual || '-'}</td>
                <td>${c.comercializadoraNova || '-'}</td>
                <td>${c.tipoEntrada || '-'}</td>
            </tr>`;
        }
        html += `</tbody></table></div>
        <button class="btn-secondary" id="backFromAdmin" style="margin-top:20px">← Voltar para Clientes</button>
        </div>`;
        
        document.getElementById("mainContent").innerHTML = html;
        
        document.getElementById("createUserBtn")?.addEventListener("click", () => {
            const uname = document.getElementById("newUsername").value;
            const pwd = document.getElementById("newPassword").value;
            const nomeC = document.getElementById("newNomeColab").value;
            const role = document.getElementById("newRoleSelect").value;
            if (!uname || !pwd || !nomeC) { alert("Preencha todos os campos"); return; }
            if (usersArray.find(u => u.username === uname)) { alert("Username já existe"); return; }
            usersArray.push({ id: Date.now().toString(), username: uname, password: pwd, role, nomeColab: nomeC });
            saveLocalData();
            renderAdminPanel();
        });
        
        document.querySelectorAll(".delUserBtn").forEach(btn => {
            btn.addEventListener("click", () => {
                const userId = btn.getAttribute("data-id");
                const usernameDel = btn.getAttribute("data-user");
                if (usernameDel === currentUser.username) { alert("Não pode remover a si mesmo"); return; }
                usersArray = usersArray.filter(u => u.id !== userId);
                saveLocalData();
                renderAdminPanel();
            });
        });
        
        document.getElementById("backFromAdmin")?.addEventListener("click", () => renderListaClientes());
    }

    // ==================== MENU ====================
    function renderMenu() {
        const menuDiv = document.getElementById("menuContainer");
        menuDiv.innerHTML = `<div class="menu-glass">
            <span style="font-weight:700; color:white">⚡ EnergyGlass · Portugal</span>
            <button id="menuClientes" class="btn-sm">🏠 Clientes</button>
            ${currentUser?.role === "admin" ? `<button id="menuAdmin" class="btn-sm">👑 Admin</button>` : ""}
            <span style="flex:1"></span>
            <span style="color:white">👤 ${currentUser?.username} (${currentUser?.role})</span>
            <button id="logoutBtnMain" class="btn-sm btn-danger">Sair</button>
        </div>`;
        
        document.getElementById("menuClientes").onclick = () => renderListaClientes();
        if (currentUser?.role === "admin") {
            document.getElementById("menuAdmin").onclick = () => renderAdminPanel();
        }
        document.getElementById("logoutBtnMain").onclick = () => {
            currentUser = null;
            showLoginScreen();
        };
    }

    // ==================== LOGIN ====================
    function showLoginScreen() {
        loadLocalData();
        const root = document.getElementById("appRoot");
        root.innerHTML = `<div class="login-overlay">
            <div class="glass-card login-card">
                <h2 style="color:white; text-align:center">🔐 EnergyGlass</h2>
                <input id="loginUser" placeholder="Usuário" value="admin" style="margin:10px 0">
                <input id="loginPass" type="password" placeholder="Senha" value="admin123">
                <button class="btn" id="loginBtn" style="width:100%; margin-top:10px">Entrar</button>
                <div id="loginErrorMsg" style="color:#ffaa88; margin-top:12px; text-align:center"></div>
                <hr style="margin:16px 0; border-color:rgba(255,255,255,0.2)">
                <small style="color:white; display:block; text-align:center">🔑 admin / admin123 &nbsp;|&nbsp; vendedor / vender123</small>
            </div>
        </div>`;
        
        document.getElementById("loginBtn").onclick = () => {
            const u = document.getElementById("loginUser").value;
            const p = document.getElementById("loginPass").value;
            const userFound = usersArray.find(us => us.username === u && us.password === p);
            if (userFound) {
                currentUser = userFound;
                initMainApp();
            } else {
                document.getElementById("loginErrorMsg").innerText = "Credenciais inválidas! Use admin/admin123";
            }
        };
    }

    // ==================== INICIALIZAÇÃO ====================
    function initMainApp() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `<div id="menuContainer"></div><div id="mainContent"></div>`;
        renderMenu();
        renderListaClientes();
    }

    // PWA - Registro do Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log("ServiceWorker error:", err));
    }

    showLoginScreen();
</script>
</body>
</html>
